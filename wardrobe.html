<!DOCTYPE html>
<html>
<head>
    <title>Wardrobe</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<nav>
    <a href="index.html">Home</a>
</nav>

<h1>My Wardrobe</h1>
    
<div id="wardrobe" class="scroll-row"></div>
<script src="js/csv-loader.js"></script>
<script>

loadCSV("data/wardrobe.csv").then(items => {

    const container = document.getElementById("wardrobe");

    items.forEach(item => {

        container.innerHTML += `
            <div class="card">
                <img src="${item.image}" alt="">
                <h2>${item.name}</h2>
                <p>${item.brand}</p>
                <p>${item.category}</p>
                <p>${item.color}</p>
                <p>${item.notes}</p>
            </div>
        `;
    });

});

</script>

</body>
</html>
