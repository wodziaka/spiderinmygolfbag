<!DOCTYPE html>
<html>
<head>
    <title>Wishlist</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    
<nav class="wishlist-nav">
    <a href="index.html">Home</a>
    <div class="categories">
        <button onclick="filterItems('all')">All</button>
        <button onclick="filterItems('tops')">Tops</button>
        <button onclick="filterItems('bottoms')">Bottoms</button>
        <button onclick="filterItems('shoes')">Shoes</button>
        <button onclick="filterItems('other')">Other</button>
    </div>
</nav>
    
<h1>Wishlist</h1>

<div id="items" class="scroll-row"></div>
<script src="js/csv-loader.js"></script>
<script>

loadCSV("data/wishlist.tsv").then(items => {

    const container = document.getElementById("items");

    items.forEach(item => {

        const firstImage =
            item.imageLinks.split(";")[0];

        container.innerHTML += `
            <div class="card">

                <img src="${firstImage}" alt="${item.name}">
                <h2>${item.name}</h2>
                <p><strong>${item.brand}</strong></p>
                <p>${item.category}</p>
                <p>$${item.price}</p>

                <button onclick="window.open('${item.link}')">
                    View Item
                </button>

            </div>
        `;
    });

});

</script>

</body>
</html>
