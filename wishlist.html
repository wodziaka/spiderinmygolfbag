<script>

let allItems = [];

loadCSV("data/wishlist.tsv").then(items => {
    allItems = items;
    displayItems(items);
});

function displayItems(items) {

    const container = document.getElementById("items");
    container.innerHTML = "";

    items.forEach(item => {

        const firstImage =
            item.imageLinks.split(";")[0];

        container.innerHTML += `
            <div class="card">

                <img src="${firstImage}" alt="${item.name}">

                <h2>${item.name}</h2>

                <p><strong>${item.brand}</strong></p>

                <p>${item.category}</p>

                <p>$${item.price}</p>

                <button onclick="window.open('${item.link}')">
                    View Item
                </button>

            </div>
        `;
    });
}

function filterItems(category) {

    if (category === "all") {
        displayItems(allItems);
        return;
    }

    const filtered = allItems.filter(item =>
        item.category.toLowerCase() === category
    );

    displayItems(filtered);
}

</script>
