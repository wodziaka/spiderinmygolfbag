<script src="js/csv-loader.js"></script>

<script>

loadCSV("data/wishlist.csv").then(items => {

    const container = document.getElementById("items");

    items.forEach(item => {

        const firstImage =
            item.imageLinks.split(";")[0];

        container.innerHTML += `
            <div class="card">

                <img src="${firstImage}" alt="${item.name}">

                <h2>${item.name}</h2>

                <p><strong>${item.brand}</strong></p>

                <p>${item.category}</p>

                <p>$${item.price}</p>

                <p>${item.occasion}</p>

                <button onclick="window.open('${item.link}')">
                    View Item
                </button>

            </div>
        `;
    });

});

</script>
