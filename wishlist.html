<body>

<a href="index.html" class="home-button">
    ← Home
</a>

<h1>Wishlist</h1>

<div id="items" class="scroll-row"></div>

<script src="js/csv-loader.js"></script>

<script>
loadCSV("data/wishlist.tsv").then(items => {

    const container = document.getElementById("items");

    items.forEach(item => {

        const firstImage =
            item.imageLinks.split(";")[0];

        container.innerHTML += `
            <div class="card">

                <img src="${firstImage}" alt="${item.name}">

                <h2>${item.name}</h2>

                <p><strong>${item.brand}</strong></p>

                <p>${item.category}</p>

                <p>$${item.price}</p>

                <p>${item.occasion}</p>

                <button onclick="window.open('${item.link}')">
                    View Item
                </button>

            </div>
        `;
    });

});
</script>

</body>
