<!DOCTYPE html>
<html>

<head>
    <title>Inspiration</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

<nav>
    <a href="index.html">Home</a>
</nav>

<h1>Inspiration Board</h1>

<div id="gallery" class="gallery"></div>

<script src="js/csv-loader.js"></script>

<script>

loadCSV("data/inspiration.csv").then(items => {

    const gallery = document.getElementById("gallery");

    items.forEach(item => {

        gallery.innerHTML += `
            <div class="card">
                <img src="${item.image}">
                <h2>${item.title}</h2>
                <p>${item.style}</p>
                <p>${item.occasion}</p>
                <p>${item.notes}</p>
            </div>
        `;
    });

});

</script>

</body>
</html>
